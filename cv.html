<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riddhiman Ghosh | Interactive CV</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-cyber: #080710;
            --surface-cyber: rgba(16, 18, 30, 0.4);
            --border-cyber: rgba(147, 51, 234, 0.2);
            --border-glow: rgba(147, 51, 234, 0.4);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-cyber: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.5);
            --glow-color: rgba(168, 85, 247, 0.15);
            --scanline-color: rgba(168, 85, 247, 0.05);
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --theme-color: #a855f7;
        }

        /* Retro Green Theme */
        [data-theme="retro-green"] {
            --accent-cyber: #22c55e;
            --accent-glow: rgba(34, 197, 94, 0.5);
            --border-cyber: rgba(34, 197, 94, 0.2);
            --border-glow: rgba(34, 197, 94, 0.4);
            --glow-color: rgba(34, 197, 94, 0.15);
            --scanline-color: rgba(34, 197, 94, 0.05);
            --theme-color: #22c55e;
        }

        /* Amber Theme */
        [data-theme="amber"] {
            --accent-cyber: #f59e0b;
            --accent-glow: rgba(245, 158, 11, 0.5);
            --border-cyber: rgba(245, 158, 11, 0.2);
            --border-glow: rgba(245, 158, 11, 0.4);
            --glow-color: rgba(245, 158, 11, 0.15);
            --scanline-color: rgba(245, 158, 11, 0.05);
            --theme-color: #f59e0b;
        }

        /* Sunset Red Theme */
        [data-theme="sunset"] {
            --accent-cyber: #f43f5e;
            --accent-glow: rgba(244, 63, 94, 0.5);
            --border-cyber: rgba(244, 63, 94, 0.2);
            --border-glow: rgba(244, 63, 94, 0.4);
            --glow-color: rgba(244, 63, 94, 0.15);
            --scanline-color: rgba(244, 63, 94, 0.05);
            --theme-color: #f43f5e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-cyber);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Grid Background overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 1;
        }

        /* Scanline Overlay option */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                var(--scanline-color) 50%, 
                rgba(0, 0, 0, 0.3) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 999;
            opacity: 0.7;
            display: none;
        }

        .scanlines.active {
            display: block;
        }

        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-cyber);
            background: rgba(8, 7, 16, 0.8);
            backdrop-filter: blur(8px);
            z-index: 10;
            position: sticky;
            top: 0;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            border: 1px solid var(--border-cyber);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.25s ease;
        }

        .back-btn:hover {
            color: var(--accent-cyber);
            border-color: var(--accent-cyber);
            box-shadow: 0 0 10px var(--glow-color);
            background: rgba(168, 85, 247, 0.05);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-section i {
            color: var(--accent-cyber);
            font-size: 1.4rem;
            animation: rotateGlobe 12s linear infinite;
        }

        @keyframes rotateGlobe {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .logo-text {
            font-family: var(--font-mono);
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .panel-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-btn {
            background: none;
            border: 1px solid var(--border-cyber);
            color: var(--text-secondary);
            padding: 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover, .control-btn.active {
            color: var(--accent-cyber);
            border-color: var(--accent-cyber);
            box-shadow: 0 0 8px var(--glow-color);
        }

        /* Color modulator dropdown */
        .theme-selector {
            background: var(--bg-cyber);
            border: 1px solid var(--border-cyber);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
        }

        .theme-selector:focus {
            border-color: var(--accent-cyber);
        }

        /* Main Workspace Container */
        .cv-container {
            display: flex;
            flex: 1;
            padding: 2rem;
            gap: 2rem;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            z-index: 5;
        }

        /* Sidebar Index Panel */
        .cv-sidebar {
            flex: 0 0 350px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .sidebar-card {
            background: var(--surface-cyber);
            border: 1px solid var(--border-cyber);
            border-radius: 8px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .sidebar-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--accent-cyber);
            box-shadow: 0 0 10px var(--accent-cyber);
        }

        .profile-hdr h2 {
            font-family: var(--font-sans);
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
            color: var(--text-primary);
        }

        .profile-hdr p {
            font-family: var(--font-mono);
            color: var(--accent-cyber);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .profile-contacts {
            border-top: 1px dashed var(--border-cyber);
            padding-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            font-size: 0.85rem;
        }

        .contact-row {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            text-decoration: none;
            font-family: var(--font-mono);
            transition: color 0.25s ease;
        }

        .contact-row:hover {
            color: var(--text-primary);
        }

        .contact-row i {
            color: var(--accent-cyber);
            width: 16px;
        }

        /* Matrix Index List */
        .index-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            list-style: none;
        }

        .index-item button {
            width: 100%;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            padding: 1rem;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .index-item button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--glow-color), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .index-item button:hover {
            color: var(--text-primary);
            border-color: var(--accent-cyber);
            padding-left: 1.25rem;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.05);
        }

        .index-item button:hover::before {
            opacity: 0.3;
        }

        .index-item.active button {
            color: var(--text-primary);
            border-color: var(--accent-cyber);
            background: rgba(168, 85, 247, 0.06);
            font-weight: 700;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.1);
        }

        .index-item.active button::after {
            content: '◄';
            color: var(--accent-cyber);
            font-size: 0.8rem;
            animation: blinker 1s infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }

        .sector-num {
            opacity: 0.4;
            margin-right: 8px;
            font-size: 0.75rem;
        }

        /* Central Terminal Viewport */
        .cv-viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--surface-cyber);
            border: 1px solid var(--border-cyber);
            border-radius: 8px;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            min-height: 500px;
        }

        .viewport-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-cyber);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .window-dots {
            display: flex;
            gap: 6px;
        }

        .window-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }

        .window-dot.close { background: #ef4444; }
        .window-dot.minimize { background: #eab308; }
        .window-dot.maximize { background: #22c55e; }

        .system-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-light {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-cyber);
            box-shadow: 0 0 8px var(--accent-cyber);
            animation: pulseStatus 2s infinite;
        }

        @keyframes pulseStatus {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* Terminal Display Area */
        .viewport-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            position: relative;
            max-height: 700px;
        }

        .output-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .term-title {
            font-family: var(--font-mono);
            color: var(--accent-cyber);
            font-size: 1.4rem;
            font-weight: 800;
            border-bottom: 1px dashed var(--border-cyber);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px var(--glow-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .term-p {
            line-height: 1.7;
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        /* Typewriter Cursor */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: var(--accent-cyber);
            margin-left: 4px;
            animation: cursorBlink 0.8s steps(2, start) infinite;
            vertical-align: middle;
        }

        @keyframes cursorBlink {
            to { visibility: hidden; }
        }

        /* Dynamic Progress Bars (Tech skills) */
        .skills-console {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin-top: 1rem;
        }

        .skill-row {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .skill-info-lbl {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .skill-name-lbl {
            color: var(--text-primary);
            font-weight: 700;
        }

        .bar-outer {
            height: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-cyber);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .bar-inner {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-cyber), var(--accent-glow));
            box-shadow: 0 0 8px var(--accent-cyber);
            width: 0;
            transition: width 1.5s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        /* Project console display list */
        .cv-project-card {
            border: 1px solid var(--border-cyber);
            background: rgba(255, 255, 255, 0.01);
            border-radius: 6px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        .cv-project-card:hover {
            background: rgba(255, 255, 255, 0.02);
            border-color: var(--accent-cyber);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.03);
        }

        .cv-project-hdr {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .cv-project-title {
            font-family: var(--font-sans);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .cv-project-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }

        .cv-project-tag {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            background: rgba(168, 85, 247, 0.1);
            color: var(--accent-cyber);
            border: 1px solid var(--border-cyber);
        }

        .cv-project-desc {
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .cv-project-link {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--accent-cyber);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.25s ease;
        }

        .cv-project-link:hover {
            color: var(--text-primary);
        }

        /* Timeline for Academics */
        .timeline {
            display: flex;
            flex-direction: column;
            position: relative;
            padding-left: 1.5rem;
            margin-top: 1rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background: var(--border-cyber);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 2rem;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            top: 6px;
            left: calc(-1.5rem - 4px);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-cyber);
            box-shadow: 0 0 8px var(--accent-cyber);
        }

        .timeline-date {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--accent-cyber);
            margin-bottom: 0.4rem;
        }

        .timeline-title {
            font-family: var(--font-sans);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .timeline-institution {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .timeline-desc {
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        /* Custom scrollbar */
        .viewport-content::-webkit-scrollbar {
            width: 8px;
        }

        .viewport-content::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        .viewport-content::-webkit-scrollbar-thumb {
            background: var(--border-cyber);
            border-radius: 4px;
        }

        .viewport-content::-webkit-scrollbar-thumb:hover {
            background: var(--accent-cyber);
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border-cyber);
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: rgba(8, 7, 16, 0.9);
            z-index: 10;
        }

        footer span {
            color: var(--accent-cyber);
        }

        /* Mobile responsiveness */
        @media (max-width: 968px) {
            .cv-container {
                flex-direction: column;
                padding: 1rem;
            }

            .cv-sidebar {
                flex: none;
                width: 100%;
            }

            .viewport-content {
                max-height: none;
            }
        }
    </style>
</head>

    <script>
        // Data Structure
        const cvData = {
            summary: {

        // Theme and Visual Configuration
        const themeChanger = document.getElementById('theme-changer');
        themeChanger.addEventListener('change', (e) => {
            if (e.target.value === 'default') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', e.target.value);
            }
            playBeep(440, 0.05);
        });

        // Scanline overlay toggle
        const crtToggle = document.getElementById('crt-toggle');
        const scanlineOverlay = document.getElementById('scanline-overlay');
        crtToggle.addEventListener('click', () => {
            scanlineOverlay.classList.toggle('active');
            crtToggle.classList.toggle('active');
            playBeep(600, 0.05);
        });

        // Audio Keystroke synthesis using Web Audio API
        let audioEnabled = false;
        const audioToggle = document.getElementById('audio-toggle');
        let audioCtx = null;

        audioToggle.addEventListener('click', () => {
            audioEnabled = !audioEnabled;
            if (audioEnabled) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioToggle.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
                audioToggle.classList.add('active');
                playBeep(880, 0.1);
            } else {
                audioToggle.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
                audioToggle.classList.remove('active');
            }
        });

        function playBeep(freq = 400, duration = 0.04) {
            if (!audioEnabled || !audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.015, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (err) {}
        }

        // Decryption Text Animation Effect
        function scrambleText(element, finalString, callback = null) {
            let currentText = "";
            let idx = 0;
            const chars = "A$#@&*%X01!_/?[]{}+-";
            let scrambleInterval = null;
            
            element.innerHTML = "";
            
            scrambleInterval = setInterval(() => {
                if (idx >= finalString.length) {
                    clearInterval(scrambleInterval);
                    element.innerHTML = finalString;
                    if (callback) callback();
                    return;
                }
                
                // Add a sound key click
                if (Math.random() > 0.4) {
                    playBeep(300 + (Math.random() * 500), 0.03);
                }
                
                let tempStr = finalString.substring(0, idx);
                for (let k = idx; k < Math.min(idx + 4, finalString.length); k++) {
                    if (finalString[k] === " " || finalString[k] === "\n") {
                        tempStr += finalString[k];
                    } else {
                        tempStr += chars[Math.floor(Math.random() * chars.length)];
                    }
                }
                
                element.innerHTML = tempStr + '<span class="cursor"></span>';
                idx += 1;
            }, 15);
        }

        const screenEl = document.getElementById('terminal-screen');
        const termStatusLbl = document.getElementById('term-status-lbl');

            termStatusLbl.textContent = "DECRYPTING...";
            screenEl.innerHTML = '<div style="font-family: var(--font-mono); color: var(--accent-cyber);">[SYS_LOAD] accessing sector: ' + sectionKey.toUpperCase() + '...</div>';
            
            setTimeout(() => {

                let htmlContent = "";

                if (sectionKey === "summary") {

                            <div class="term-p" id="desc-body"></div>
                        </div>
                    `;
                    screenEl.innerHTML = htmlContent;
                    const descEl = document.getElementById('desc-body');
                    scrambleText(descEl, data.content, () => {
                        termStatusLbl.textContent = "ONLINE";
                    });
                } 
                else if (sectionKey === "skills") {
                    htmlContent = `

                    data.items.forEach((skill, index) => {
                        htmlContent += `

                                </div>
                            </div>
                        `;
                    });
                    htmlContent += `</div></div>`;
                    screenEl.innerHTML = htmlContent;
                    
                    // Animate skill bars

        // Setup Sidebar Click Listeners
        const menuItems = document.querySelectorAll('.index-item');
        menuItems.forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                if (item.classList.contains('active')) return;
                
                menuItems.forEach(i => {
                    i.classList.remove('active');
                    i.querySelector('button').setAttribute('aria-selected', 'false');
                });
                
                item.classList.add('active');
                item.querySelector('button').setAttribute('aria-selected', 'true');
                
                const sector = item.getAttribute('data-sector');
                loadCVSection(sector);
            });
        });

        window.addEventListener('DOMContentLoaded', () => {

        });
    </script>
